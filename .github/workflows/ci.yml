name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            args: ""
          - name: tokio
            args: -p tinyweb --features tokio
          - name: compio
            args: -p tinyweb --features compio
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check ${{ matrix.args }}

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            args: ""
          - name: tokio
            args: -p tinyweb --features tokio
          - name: compio
            args: -p tinyweb --features compio
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run ${{ matrix.args }}

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  msrv:
    name: MSRV (1.87.0)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            args: ""
          - name: tokio
            args: -p tinyweb --features tokio
          - name: compio
            args: -p tinyweb --features compio
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check ${{ matrix.args }}
